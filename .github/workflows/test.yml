name: Tests

on:
  pull_request:
    branches: [main]

jobs:
  test:
    if: github.repository == 'tracedown/lacelang-js-validator' && !startsWith(github.event.pull_request.title, 'WIP:')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["18", "20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        run: rm -f package-lock.json && npm install
      - name: Build
        run: npm run build
      - name: Run tests
        run: npm test

  conformance:
    needs: test
    if: github.repository == 'tracedown/lacelang-js-validator' && !startsWith(github.event.pull_request.title, 'WIP:')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install and build
        run: rm -f package-lock.json && npm install && npm run build
      - name: Download conformance harness
        run: |
          gh release download testkit-v0.9.1 -R tracedown/lacelang -p 'lace-conformance-linux-x86_64'
          chmod +x lace-conformance-linux-x86_64
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Clone test certs
        run: git clone --depth 1 --filter=blob:none --sparse https://github.com/tracedown/lacelang.git ../lacelang && cd ../lacelang && git sparse-checkout set testkit/certs
      - name: Generate TLS test certs
        run: mkdir -p /tmp/lace-certs && sh ../lacelang/testkit/certs/generate-certs.sh /tmp/lace-certs
      - name: Run conformance suite
        run: ./lace-conformance-linux-x86_64 -m lace-executor.toml --certs-dir /tmp/lace-certs

  build-check:
    needs: conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install and build
        run: rm -f package-lock.json && npm install && npm run build
      - name: Pack dry run
        run: npm pack --dry-run
