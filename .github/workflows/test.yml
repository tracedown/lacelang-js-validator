name: Tests

on:
  pull_request:
    branches: [main]

jobs:
  test:
    if: github.repository == 'tracedown/lacelang-js-validator' && !startsWith(github.event.pull_request.title, 'WIP:')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["18", "20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        run: rm -f package-lock.json && npm install
      - name: Build
        run: npm run build
      - name: Run tests
        run: npm test

  conformance:
    needs: test
    if: github.repository == 'tracedown/lacelang-js-validator' && !startsWith(github.event.pull_request.title, 'WIP:')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install and build
        run: rm -f package-lock.json && npm install && npm run build
      - name: Clone lacelang spec repo
        run: git clone --depth 1 https://github.com/tracedown/lacelang.git ../lacelang
      - name: Install OpenSSL dev
        run: sudo apt-get update && sudo apt-get install -y libssl-dev
      - name: Build conformance harness
        run: cd ../lacelang/testkit/src && make
      - name: Generate TLS test certs
        run: mkdir -p /tmp/lace-certs && sh ../lacelang/testkit/certs/generate-certs.sh /tmp/lace-certs
      - name: Run conformance suite
        run: ../lacelang/testkit/src/build/lace-conformance -m lace-executor.toml --vectors ../lacelang/testkit/vectors --certs-dir /tmp/lace-certs

  build-check:
    needs: conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install and build
        run: rm -f package-lock.json && npm install && npm run build
      - name: Pack dry run
        run: npm pack --dry-run
